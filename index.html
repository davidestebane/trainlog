<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrainLog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0d0d; --surface:#141414; --surface2:#1c1c1c; --border:#2a2a2a;
    --accent:#c8ff00; --text:#e8e8e8; --muted:#555;
    --push:#ff6b35; --pull:#00c9ff; --leg:#c8ff00;
    --error:#ff4444; --success:#00cc66;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:999;opacity:0.3;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
  }

  /* ── AUTH SCREEN ── */
  #authScreen{
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:20px;
  }
  .auth-box{
    width:100%;max-width:380px;
    border:1px solid var(--border);background:var(--surface);
    padding:40px 36px;
  }
  .auth-logo{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:4px;color:var(--accent);margin-bottom:4px;}
  .auth-logo span{color:var(--text);}
  .auth-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
  .auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:28px;}
  .auth-tab{
    flex:1;padding:10px;background:none;border:none;color:var(--muted);
    font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;
    text-transform:uppercase;cursor:pointer;transition:color .15s;border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .auth-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .field{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
  .field label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
  .field input{
    background:var(--surface2);border:1px solid var(--border);color:var(--text);
    font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 12px;outline:none;
    transition:border-color .15s;
  }
  .field input:focus{border-color:var(--accent);}
  .btn-primary{
    width:100%;padding:12px;background:var(--accent);color:#000;border:none;
    font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;
    cursor:pointer;transition:opacity .15s;margin-top:8px;
  }
  .btn-primary:hover{opacity:.85;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .auth-msg{font-family:'DM Mono',monospace;font-size:11px;margin-top:14px;text-align:center;min-height:18px;}
  .auth-msg.error{color:var(--error);}
  .auth-msg.success{color:var(--success);}

  /* ── MAIN APP ── */
  #appScreen{display:none;}
  header{padding:24px 44px 20px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--border);}
  .header-left{display:flex;align-items:flex-end;gap:14px;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:44px;letter-spacing:4px;line-height:1;color:var(--accent);}
  .logo span{color:var(--text);}
  .tagline{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;padding-bottom:6px;}
  .header-right{display:flex;align-items:center;gap:12px;}
  .user-email{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;}
  .sync-status{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 8px;border:1px solid;}
  .sync-status.saved{color:var(--success);border-color:rgba(0,204,102,.3);}
  .sync-status.saving{color:var(--muted);border-color:var(--border);}
  .sync-status.error{color:var(--error);border-color:rgba(255,68,68,.3);}
  .sync-dot{display:none;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .btn-logout{
    background:none;border:1px solid var(--border);color:var(--muted);
    font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;
    padding:5px 10px;cursor:pointer;transition:all .15s;
  }
  .btn-logout:hover{border-color:var(--error);color:var(--error);}

  .main{display:grid;grid-template-columns:290px 1fr;min-height:calc(100vh - 82px);}
  .sidebar{border-right:1px solid var(--border);padding:24px 20px;display:flex;flex-direction:column;gap:26px;overflow-y:auto;}
  .content{padding:28px 36px;display:flex;flex-direction:column;gap:24px;overflow-y:auto;}

  .sec-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}

  .stepper{display:flex;align-items:center;border:1px solid var(--border);width:fit-content;}
  .stepper button{width:32px;height:32px;background:var(--surface2);border:none;color:var(--text);font-size:17px;cursor:pointer;transition:background .15s;}
  .stepper button:hover{background:var(--border);}
  .stepper .val{width:52px;height:32px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);border-left:1px solid var(--border);border-right:1px solid var(--border);}
  .config-row{display:flex;flex-direction:column;gap:6px;}
  .config-row label{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;}
  .config-hint{font-size:10px;color:#444;font-family:'DM Mono',monospace;margin-top:2px;}

  .week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
  .week-btn{aspect-ratio:1;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Bebas Neue',sans-serif;font-size:19px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
  .week-btn:hover{border-color:var(--accent);color:var(--text);}
  .week-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}

  .ex-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 6px;border-radius:2px;text-align:center;flex-shrink:0;}
  .ex-badge.push{background:rgba(255,107,53,.15);color:var(--push);}
  .ex-badge.pull{background:rgba(0,201,255,.15);color:var(--pull);}
  .ex-badge.leg{background:rgba(200,255,0,.15);color:var(--leg);}

  .ex-group{margin-bottom:18px;}
  .ex-edit-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);}
  .ex-edit-row:last-child{border-bottom:none;}
  .var-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:14px;flex-shrink:0;}
  .name-input{flex:1;background:transparent;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;outline:none;border-bottom:1px solid transparent;transition:border-color .15s;padding:2px 0;}
  .name-input:focus{border-bottom-color:var(--border);}
  .max-input{width:46px;background:var(--surface2);border:1px solid var(--border);color:var(--accent);font-family:'DM Mono',monospace;font-size:12px;text-align:center;padding:3px;outline:none;transition:border-color .15s;}
  .max-input:focus{border-color:var(--accent);}
  .btn-icon{width:22px;height:22px;background:none;border:1px solid var(--border);color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;line-height:1;}
  .btn-icon:hover{border-color:var(--error);color:var(--error);}
  .btn-add{width:100%;padding:5px;background:var(--surface2);border:1px dashed var(--border);color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .15s;margin-top:6px;}
  .btn-add:hover{border-color:var(--accent);color:var(--accent);}

  .content-header{display:flex;align-items:flex-start;justify-content:space-between;}
  .week-title{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:1;letter-spacing:2px;}
  .week-title span{display:block;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);letter-spacing:3px;margin-bottom:4px;}
  .vol-box{background:var(--surface2);border:1px solid var(--border);padding:10px 18px;text-align:right;}
  .vol-num{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--accent);line-height:1;}
  .vol-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;}

  .workouts-grid{display:grid;gap:12px;}
  .workout-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;opacity:0;transform:translateY(10px);animation:fadeUp .35s forwards;}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
  .wcard-header{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--surface2);border-bottom:1px solid var(--border);}
  .day-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-right:2px;}
  .workout-name{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:3px;flex:1;}
  .workout-name.wA{color:var(--push);}
  .workout-name.wB{color:var(--pull);}
  .workout-name.wC{color:var(--leg);}
  .rfem-tag{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;letter-spacing:1px;border:1px solid;}
  .rfem-tag.wA{background:rgba(255,107,53,.1);color:var(--push);border-color:rgba(255,107,53,.3);}
  .rfem-tag.wB{background:rgba(0,201,255,.1);color:var(--pull);border-color:rgba(0,201,255,.3);}
  .rfem-tag.wC{background:rgba(200,255,0,.1);color:var(--leg);border-color:rgba(200,255,0,.3);}
  .sets-tag{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border:1px solid var(--border);color:var(--muted);}
  .wcard-body{padding:14px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}

  .ex-tile{background:var(--surface2);border:1px solid var(--border);padding:14px 16px;display:flex;flex-direction:column;gap:8px;transition:border-color .2s;}
  .ex-tile:hover{border-color:#333;}
  .ex-tile-top{display:flex;align-items:center;gap:8px;}
  .ex-tile-name{font-size:13px;font-weight:500;line-height:1.3;}
  .ex-tile-reps{display:flex;align-items:baseline;gap:6px;margin-top:2px;}
  .reps-big{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;}
  .reps-big.push{color:var(--push);}
  .reps-big.pull{color:var(--pull);}
  .reps-big.leg{color:var(--leg);}
  .reps-unit{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1;display:flex;flex-direction:column;gap:2px;}
  .reps-unit strong{color:var(--text);font-size:13px;font-family:'Bebas Neue',sans-serif;font-weight:400;}
  .ex-tile-formula{font-family:'DM Mono',monospace;font-size:9px;color:#3a3a3a;letter-spacing:.5px;margin-top:2px;}

  .legend{border-top:1px solid var(--border);padding-top:20px;display:flex;gap:24px;flex-wrap:wrap;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
  .legend-item{display:flex;align-items:center;gap:7px;}
  .ldot{width:7px;height:7px;border-radius:50%;}

  @media(max-width:900px){
    .main{grid-template-columns:1fr;}
    .sidebar{border-right:none;border-bottom:1px solid var(--border);}
    header{padding:14px 20px;align-items:center;}
    .content{padding:20px;}
    .tagline{display:none;}
    .user-email{display:none;}
    .sync-status{display:none;}
    .sync-dot{display:block;}
    .logo{font-size:34px;}
    .header-right{gap:10px;}
  }
</style>
</head>
<body>

<!-- ── AUTH SCREEN ── -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">TRAIN<span>LOG</span></div>
    <div class="auth-sub">Progressive Calisthenics · RFEM System</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="auth-tab" onclick="switchTab('signup')">Crear cuenta</button>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="tu@email.com" onkeydown="if(event.key==='Enter')authSubmit()">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="authPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')authSubmit()">
    </div>

    <button class="btn-primary" id="authBtn" onclick="authSubmit()">ENTRAR</button>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<!-- ── APP SCREEN ── -->
<div id="appScreen">
  <header>
    <div class="header-left">
      <div class="logo">TRAIN<span>LOG</span></div>
      <div class="tagline">Progressive Calisthenics · RFEM System</div>
    </div>
    <div class="header-right">
      <div class="user-email" id="userEmail"></div>
      <div class="sync-status saved" id="syncStatus">● GUARDADO</div>
      <div class="sync-dot" id="syncDot" style="background:var(--success)"></div>
      <button class="btn-logout" onclick="logout()">SALIR</button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div>
        <div class="sec-label">Configuración semanal</div>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div class="config-row">
            <label>Días por semana</label>
            <div class="stepper">
              <button onclick="adj('days',-1)">−</button>
              <div class="val" id="daysVal">3</div>
              <button onclick="adj('days',1)">+</button>
            </div>
          </div>
          <div class="config-row">
            <label>Volumen semanal (sets totales)</label>
            <div class="stepper">
              <button onclick="adj('volume',-1)">−</button>
              <div class="val" id="volVal">12</div>
              <button onclick="adj('volume',1)">+</button>
            </div>
            <div class="config-hint" id="setsHint"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="sec-label">Semana actual</div>
        <div class="week-grid" id="weekGrid"></div>
      </div>

      <div style="flex:1">
        <div class="sec-label">Ejercicios y máximos</div>
        <div id="exEditor"></div>
      </div>
    </aside>

    <main class="content">
      <div class="content-header">
        <div class="week-title">
          <span>SEMANA ACTIVA</span>
          <span id="weekNum">—</span>
        </div>
        <div class="vol-box">
          <div class="vol-num" id="totalSets">—</div>
          <div class="vol-lbl">Sets totales / semana</div>
        </div>
      </div>
      <div class="workouts-grid" id="workoutsGrid"></div>
      <div class="legend">
        <div class="legend-item"><div class="ldot" style="background:var(--push)"></div>Workout A</div>
        <div class="legend-item"><div class="ldot" style="background:var(--pull)"></div>Workout B</div>
        <div class="legend-item"><div class="ldot" style="background:var(--leg)"></div>Workout C</div>
        <div style="margin-left:auto;font-size:10px;color:#3a3a3a;">reps = máximo − RFEM</div>
      </div>
    </main>
  </div>
</div>

<script>
// ─── SUPABASE CONFIG ─────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://gtttktrvywvfdkdkghay.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0dHRrdHJ2eXd2ZmRrZGtnaGF5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzgxMzgsImV4cCI6MjA4ODg1NDEzOH0.81rPC-uW7QxSd0WF0ajPHwsRHgBG2l_Xhpp3bF-ICdQ';

async function sbFetch(path, options={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(options.headers||{})
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.message || res.statusText);
  }
  return res.status === 204 ? null : res.json();
}

// ─── PASSWORD HASHING (simple SHA-256) ───────────────────────────────────────
async function hashPassword(password) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(password));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ─── AUTH STATE ───────────────────────────────────────────────────────────────
let currentEmail = localStorage.getItem('tl_email') || null;

// ─── AUTH UI ──────────────────────────────────────────────────────────────────
let authMode = 'login';

function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && mode==='login') || (i===1 && mode==='signup'));
  });
  document.getElementById('authBtn').textContent = mode === 'login' ? 'ENTRAR' : 'CREAR CUENTA';
  setAuthMsg('', '');
}

function setAuthMsg(msg, type='') {
  const el = document.getElementById('authMsg');
  el.textContent = msg;
  el.className = 'auth-msg' + (type ? ` ${type}` : '');
}

async function authSubmit() {
  const email    = document.getElementById('authEmail').value.trim().toLowerCase();
  const password = document.getElementById('authPassword').value;
  const btn      = document.getElementById('authBtn');

  if (!email || !password) return setAuthMsg('Completá los dos campos.', 'error');
  if (password.length < 6)  return setAuthMsg('La contraseña necesita al menos 6 caracteres.', 'error');

  btn.disabled = true;
  setAuthMsg('Verificando...', '');

  try {
    const hash = await hashPassword(password);

    if (authMode === 'signup') {
      // Check if account exists
      const existing = await sbFetch(`accounts?email=eq.${encodeURIComponent(email)}&select=email`);
      if (existing.length > 0) {
        setAuthMsg('Ya existe una cuenta con ese email.', 'error');
        btn.disabled = false; return;
      }
      // Create account
      await sbFetch('accounts', { method:'POST', body: JSON.stringify({ email, password_hash: hash }) });
      // Create empty user_data
      await sbFetch('user_data', { method:'POST', body: JSON.stringify({ email, data: getDefaultState() }) });
      setAuthMsg('¡Cuenta creada! Iniciando sesión...', 'success');
      await new Promise(r=>setTimeout(r,800));
    }

    // Login: verify
    const rows = await sbFetch(`accounts?email=eq.${encodeURIComponent(email)}&password_hash=eq.${hash}&select=email`);
    if (rows.length === 0) {
      setAuthMsg('Email o contraseña incorrectos.', 'error');
      btn.disabled = false; return;
    }

    // ✅ Logged in
    currentEmail = email;
    localStorage.setItem('tl_email', email);
    await loadUserData();
    showApp();

  } catch(e) {
    setAuthMsg('Error: ' + e.message, 'error');
    btn.disabled = false;
  }
}

function logout() {
  currentEmail = null;
  localStorage.removeItem('tl_email');
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('authEmail').value = '';
  document.getElementById('authPassword').value = '';
  document.getElementById('authBtn').disabled = false;
  setAuthMsg('', '');
}

// ─── DATA DEFAULTS ────────────────────────────────────────────────────────────
function getDefaultState() {
  return {
    days: 3, volume: 12, week: 1,
    exercises: {
      push: [
        { name:'Diamond Push-Ups', max:15 },
        { name:'Pike Push-Ups',    max:13 },
        { name:'Ring Dips',        max:9  },
      ],
      pull: [
        { name:'Pull Ups',         max:8  },
        { name:'Rows',             max:9  },
        { name:'NG Chin Ups',      max:8  },
      ],
      leg: [
        { name:'Squats',           max:20 },
        { name:'Lunges',           max:20 },
      ],
    }
  };
}

let state = getDefaultState();

// ─── SUPABASE SYNC ───────────────────────────────────────────────────────────
let saveTimer = null;

async function loadUserData() {
  const rows = await sbFetch(`user_data?email=eq.${encodeURIComponent(currentEmail)}&select=data`);
  if (rows.length > 0 && rows[0].data) {
    const saved = rows[0].data;
    // Merge to ensure all keys exist
    state = { ...getDefaultState(), ...saved };
    if (!state.exercises) state.exercises = getDefaultState().exercises;
  } else {
    state = getDefaultState();
  }
}

async function saveUserData() {
  setSyncStatus('saving');
  try {
    // Upsert on email conflict
    const res = await fetch(`${SUPABASE_URL}/rest/v1/user_data?on_conflict=email`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal',
      },
      body: JSON.stringify({ email: currentEmail, data: state })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || res.statusText);
    }
    setSyncStatus('saved');
  } catch(e) {
    console.error('Save error:', e);
    setSyncStatus('error');
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setSyncStatus('saving');
  saveTimer = setTimeout(saveUserData, 1000);
}

function setSyncStatus(s) {
  const el  = document.getElementById('syncStatus');
  const dot = document.getElementById('syncDot');
  const map = {
    saving: ['● GUARDANDO...', 'saving', 'var(--muted)'],
    saved:  ['● GUARDADO',     'saved',  'var(--success)'],
    error:  ['● ERROR',        'error',  'var(--error)'],
  };
  const [txt, cls, dotColor] = map[s];
  el.textContent  = txt;
  el.className    = `sync-status ${cls}`;
  if (dot) dot.style.background = dotColor;
}

// ─── SHOW APP ─────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display  = 'block';
  document.getElementById('userEmail').textContent    = currentEmail;
  document.getElementById('daysVal').textContent  = state.days;
  document.getElementById('volVal').textContent   = state.volume;
  renderWeekGrid();
  renderExEditor();
  renderWorkouts();
}

// ─── TRAINING CONSTANTS ───────────────────────────────────────────────────────
const RFEM_DATA = [
  [3,4,3,4,4,3,3],
  [2,3,4,2,3,4,2],
  [2,3,2,3,3,2,3],
  [1,2,3,4,1,2,3],
  [1,2,3,1,2,3,1],
];
const WEEK_START  = [0,1,2,0,1];
const LETTERS     = ['A','B','C'];
const TYPE_LABELS = { push:'Push', pull:'Pull', leg:'Legs' };

function getSetsArr() {
  const base  = Math.floor(state.volume / state.days);
  const extra = state.volume % state.days;
  return Array.from({length:state.days}, (_,i) => base + (i < extra ? 1 : 0));
}
function getSessionWorkout(wIdx, sIdx) { return LETTERS[(WEEK_START[wIdx]+sIdx)%3]; }
function getExercisesForWorkout(type) {
  const vi = LETTERS.indexOf(type);
  return ['push','pull','leg'].reduce((acc,grp) => {
    if (vi < state.exercises[grp].length) acc.push({...state.exercises[grp][vi], type:grp});
    return acc;
  }, []);
}
function updateHint() {
  const arr = getSetsArr();
  const u = [...new Set(arr)].sort((a,b)=>b-a);
  document.getElementById('setsHint').textContent = `→ ${u.join('/')} sets/sesión`;
}

// ─── WEEK GRID ────────────────────────────────────────────────────────────────
function renderWeekGrid() {
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';
  for (let w=1; w<=5; w++) {
    const b = document.createElement('button');
    b.className = 'week-btn' + (state.week===w?' active':'');
    b.textContent = w;
    b.onclick = () => { state.week=w; scheduleSave(); renderWeekGrid(); renderWorkouts(); };
    grid.appendChild(b);
  }
}

// ─── EX EDITOR ───────────────────────────────────────────────────────────────
function renderExEditor() {
  const el = document.getElementById('exEditor');
  el.innerHTML = '';
  ['push','pull','leg'].forEach(grp => {
    const group = document.createElement('div');
    group.className = 'ex-group';
    group.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span class="ex-badge ${grp}">${grp}</span>
        <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;">${TYPE_LABELS[grp]}</span>
      </div>
    `;
    state.exercises[grp].forEach((ex, idx) => {
      const row = document.createElement('div');
      row.className = 'ex-edit-row';
      row.innerHTML = `
        <span class="var-lbl">${LETTERS[idx]||'+'}</span>
        <input class="name-input" type="text" value="${ex.name}" placeholder="Ejercicio..."
          oninput="updateExName('${grp}',${idx},this.value)">
        <input class="max-input" type="number" value="${ex.max}" min="1" max="200"
          onchange="updateExMax('${grp}',${idx},this.value)">
        <button class="btn-icon" onclick="removeEx('${grp}',${idx})">×</button>
      `;
      group.appendChild(row);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add';
    addBtn.textContent = `+ AGREGAR ${TYPE_LABELS[grp].toUpperCase()}`;
    addBtn.onclick = () => addEx(grp);
    group.appendChild(addBtn);
    el.appendChild(group);
  });
}

function updateExName(grp,idx,val){ state.exercises[grp][idx].name=val; scheduleSave(); renderWorkouts(); }
function updateExMax(grp,idx,val){ state.exercises[grp][idx].max=Math.max(1,parseInt(val)||1); scheduleSave(); renderWorkouts(); }
function removeEx(grp,idx){
  if(state.exercises[grp].length<=1) return;
  state.exercises[grp].splice(idx,1);
  scheduleSave(); renderExEditor(); renderWorkouts();
}
function addEx(grp){
  state.exercises[grp].push({name:'',max:10});
  scheduleSave(); renderExEditor(); renderWorkouts();
  setTimeout(()=>{
    const groups = document.querySelectorAll('#exEditor .ex-group');
    const gi = ['push','pull','leg'].indexOf(grp);
    const rows = groups[gi].querySelectorAll('.ex-edit-row');
    rows[rows.length-1].querySelector('.name-input').focus();
  },50);
}

// ─── WORKOUTS ─────────────────────────────────────────────────────────────────
function renderWorkouts() {
  const grid  = document.getElementById('workoutsGrid');
  const wIdx  = state.week-1;
  const sArr  = getSetsArr();
  const total = sArr.reduce((a,b)=>a+b,0);
  document.getElementById('weekNum').textContent   = `SEMANA ${state.week}`;
  document.getElementById('totalSets').textContent = total;
  updateHint();
  grid.innerHTML = '';
  for (let d=0; d<state.days; d++) {
    const type   = getSessionWorkout(wIdx,d);
    const rfem   = RFEM_DATA[wIdx][d] ?? RFEM_DATA[wIdx][d%RFEM_DATA[wIdx].length];
    const sets   = sArr[d];
    const exList = getExercisesForWorkout(type);
    const wCls   = `w${type}`;
    const card   = document.createElement('div');
    card.className = 'workout-card';
    card.style.animationDelay = `${d*.07}s`;
    const tilesHTML = exList.map(ex => {
      const reps = Math.max(1, ex.max-rfem);
      return `
        <div class="ex-tile">
          <div class="ex-tile-top">
            <span class="ex-badge ${ex.type}">${ex.type}</span>
            <span class="ex-tile-name">${ex.name||'—'}</span>
          </div>
          <div class="ex-tile-reps">
            <span class="reps-big ${ex.type}">${reps}</span>
            <div class="reps-unit"><strong>${sets} SETS</strong><span>reps / set</span></div>
          </div>
          <div class="ex-tile-formula">máx ${ex.max} − rfem ${rfem}</div>
        </div>`;
    }).join('');
    card.innerHTML = `
      <div class="wcard-header">
        <span class="day-lbl">DÍA ${d+1}</span>
        <span class="workout-name ${wCls}">WORKOUT ${type}</span>
        <span class="rfem-tag ${wCls}">RFEM −${rfem}</span>
        <span class="sets-tag">${sets} sets</span>
      </div>
      <div class="wcard-body">${tilesHTML}</div>`;
    grid.appendChild(card);
  }
}

// ─── STEPPERS ─────────────────────────────────────────────────────────────────
function adj(key,delta){
  const limits={days:[1,7],volume:[3,30]};
  const [mn,mx]=limits[key];
  state[key]=Math.min(mx,Math.max(mn,state[key]+delta));
  document.getElementById(key==='days'?'daysVal':'volVal').textContent=state[key];
  scheduleSave();
  if(key==='days') renderWeekGrid();
  renderWorkouts();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  // If we have a saved email, try auto-login
  if (currentEmail) {
    try {
      // Verify account still exists
      const rows = await sbFetch(`accounts?email=eq.${encodeURIComponent(currentEmail)}&select=email`);
      if (rows.length > 0) {
        await loadUserData();
        showApp();
        return;
      }
    } catch(e) {}
    localStorage.removeItem('tl_email');
    currentEmail = null;
  }
  document.getElementById('authScreen').style.display = 'flex';
}

init();
</script>
